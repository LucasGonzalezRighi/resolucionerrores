<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d6efd" />
    <link rel="stylesheet" href="./styles/bootstrap-icons.min.css"/>
    <link rel="stylesheet" href="./styles/bootstrap.min.css"/>
    <link rel="stylesheet" href="./styles/styles.css" />
    <link rel="manifest" href="./manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/stock-counter/sw.js', {scope: '/stock-counter/'}).then(function(registration) {
            // Registration was successful
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          }, function(err) {
            // registration failed :(
            console.log('ServiceWorker registration failed: ', err);
          });
        });
      }
    </script>
    <title>Benasu Stock</title>
  </head>
  <body>
    <header class="app-header">
      <h1><i class="bi bi-upc-scan"></i> Benasu Stock</h1>
      <button class="menu-btn" id="mainMenu" aria-label="Menú"><i class="bi bi-list"></i></button>
    </header>

    <div class="app">
      <div class="scan-zone">
        <div class="controls">
          <span class="section-label">Sección <strong id="currentSectionSpan">1</strong> / <span id="totalSectionsSpan">1</span></span>
          <div class="section-buttons">
            <button type="button" id="sectionPlus" class="btn btn-primary btn-section"><i class="bi bi-plus"></i></button>
            <button type="button" id="sectionMinus" class="btn btn-primary btn-section disabled"><i class="bi bi-dash"></i></button>
            <button type="button" id="sectionDelete" class="btn btn-danger btn-section disabled"><i class="bi bi-trash"></i></button>
          </div>
        </div>

        <div class="input-group scan-input">
          <input type="text" id="barcodeInput" class="form-control" placeholder="Código de Barras" aria-label="Código de Barras">
          <button class="btn btn-primary" id="barcodeEnter" type="button" aria-label="Agregar"><i class="bi bi-arrow-return-left"></i></button>
        </div>
        <p class="scan-ready"><i class="bi bi-broadcast"></i> Listo para escanear</p>
      </div>

      <main class="item-list">
        <table class="table">
          <thead>
            <tr>
              <th scope="col" class="col-edit">Editar</th>
              <th scope="col" class="col-amount">Cant.</th>
              <th scope="col">Código de Barras</th>
            </tr>
          </thead>
          <tbody id="tableBody">

          </tbody>
        </table>
      </main>

      <div class="totals">
        <div class="total-item">
          <span class="total-label px-2">Sección</span>
          <span class="total-value" id="totalItemsSection">0</span>
        </div>
        <div class="total-item">
          <span class="total-label px-2">Total</span>
          <span class="total-value" id="totalItems">0</span>
        </div>
      </div>
    </div>

    <script src="./js/bootstrap.bundle.min.js"></script>
    <script src="./js/sweetalert2.min.js"></script>
    <script src="./js/papaparse.min.js"></script>
    <script src="./js/reader.js"></script>
  </body>
</html>
